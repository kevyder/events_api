services:
  db-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_db"]
      interval: 3s
      timeout: 3s
      retries: 5

  fastapi-test:
    build: .
    container_name: events_api_test
    command: >
      bash -c "uv sync --group test -qq
      && pytest --cov=. tests/ --maxfail=1 --disable-warnings -v"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://test_user:test_password@db-test:5432/test_db
      - JWT_SECRET_KEY=test-secret-key
    depends_on:
      db-test:
        condition: service_healthy
    working_dir: /app
