services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: events_user
      POSTGRES_PASSWORD: events_password
      POSTGRES_DB: events_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U events_user -d events_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  fastapi:
    build: .
    restart: always
    container_name: events_api
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://events_user:events_password@db:5432/events_db
      - JWT_SECRET_KEY=dev-secret-key-change-in-production
      - DEFAULT_ADMIN_EMAIL=admin@email.com
      - DEFAULT_ADMIN_PASSWORD=admin
      - CORS_ORIGINS=http://localhost:5173
      - UVICORN_RELOAD=true
    depends_on:
      db:
        condition: service_healthy
    command: /app/start.sh

volumes:
  postgres_data:
